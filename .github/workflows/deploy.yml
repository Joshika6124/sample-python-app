name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/joshika6124/sample-python-app:latest .

      - name: Push Docker image
        run: docker push ghcr.io/joshika6124/sample-python-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u Joshika6124 --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/sample-python-app:latest
            docker stop sample-python-app || true
            docker rm sample-python-app || true
            docker run -d --name sample-python-app -p 5001:5001 ghcr.io/joshika6124/sample-python-app:latest
